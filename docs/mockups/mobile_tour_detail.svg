<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD60A"/>
      <stop offset="0.5" stop-color="#F5A524"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD60A"/>
      <stop offset="1" stop-color="#FFAB00"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="#FFFBEA"/>

  <!-- Hero image -->
  <rect width="390" height="380" fill="url(#heroBg)"/>

  <!-- Status bar dark text on yellow -->
  <text x="28" y="28" font-size="14" font-weight="600" fill="#0A0A0A">9:41</text>
  <g transform="translate(330,18)" fill="#0A0A0A">
    <rect x="0" y="0" width="18" height="10" rx="2"/>
    <rect x="22" y="2" width="14" height="6" rx="1"/>
    <rect x="40" y="0" width="22" height="10" rx="3" fill="none" stroke="#0A0A0A" stroke-width="1"/>
    <rect x="42" y="2" width="16" height="6" rx="1"/>
  </g>

  <!-- Back / Share / Heart -->
  <circle cx="36" cy="72" r="20" fill="#0A0A0A" opacity="0.55"/>
  <text x="36" y="78" text-anchor="middle" font-size="18" fill="#FFD60A">←</text>
  <circle cx="312" cy="72" r="20" fill="#0A0A0A" opacity="0.55"/>
  <text x="312" y="78" text-anchor="middle" font-size="14" fill="#FFD60A">↗</text>
  <circle cx="356" cy="72" r="20" fill="#0A0A0A" opacity="0.55"/>
  <text x="356" y="78" text-anchor="middle" font-size="14" fill="#FFD60A">♡</text>

  <!-- Image dots -->
  <g transform="translate(170,360)">
    <rect width="20" height="4" rx="2" fill="#FFD60A"/>
    <circle cx="30" cy="2" r="2" fill="#FFFBEA" opacity="0.7"/>
    <circle cx="40" cy="2" r="2" fill="#FFFBEA" opacity="0.7"/>
    <circle cx="50" cy="2" r="2" fill="#FFFBEA" opacity="0.7"/>
  </g>

  <!-- Title card lifted -->
  <g transform="translate(20,332)" filter="url(#sh)">
    <rect width="350" height="118" rx="20" fill="#FFFBEA"/>
    <rect x="14" y="14" width="64" height="22" rx="11" fill="#0A0A0A"/>
    <text x="46" y="29" text-anchor="middle" font-size="10" font-weight="700" fill="#FFD60A">✓ Verified</text>
    <text x="14" y="58" font-size="18" font-weight="800" fill="#0A0A0A">Đà Nẵng — Bà Nà Hills</text>
    <text x="14" y="76" font-size="12" fill="#6B6B70">3 ngày 2 đêm · Khởi hành hằng ngày</text>
    <text x="14" y="100" font-size="13" font-weight="700" fill="#0A0A0A">★ 4.9</text>
    <text x="44" y="100" font-size="12" fill="#6B6B70">(2.341 đánh giá)  ·  3.2k đã đặt</text>
  </g>

  <!-- Tabs sticky -->
  <g transform="translate(20,470)">
    <text font-size="14" font-weight="800" fill="#0A0A0A">Tổng quan</text>
    <rect x="-4" y="22" width="80" height="3" rx="2" fill="#FFD60A"/>
    <text x="100" font-size="14" fill="#6B6B70">Lịch trình</text>
    <text x="180" font-size="14" fill="#6B6B70">Đánh giá</text>
    <text x="260" font-size="14" fill="#6B6B70">Chính sách</text>
    <line x1="-20" y1="34" x2="370" y2="34" stroke="#0A0A0A" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- AI summary block -->
  <g transform="translate(20,520)">
    <rect width="350" height="120" rx="16" fill="#0A0A0A"/>
    <rect x="0" y="0" width="6" height="120" rx="3" fill="#FFD60A"/>
    <text x="20" y="26" font-size="11" font-weight="800" fill="#FFD60A">✨ AI tóm tắt 2.341 review</text>
    <text x="20" y="50" font-size="12" fill="#FFFBEA">👍 Khách yêu thích: HDV thân thiện, view</text>
    <text x="20" y="66" font-size="12" fill="#FFFBEA">  cáp treo đẹp, đồ ăn buffet phong phú.</text>
    <text x="20" y="92" font-size="12" fill="#FFFBEA">⚠ Cần lưu ý: di chuyển nhiều, mang giày</text>
    <text x="20" y="108" font-size="12" fill="#FFFBEA">  đi bộ, sương lạnh buổi tối.</text>
  </g>

  <!-- Operator card -->
  <g transform="translate(20,660)">
    <rect width="350" height="62" rx="14" fill="#FFFBEA" stroke="#0A0A0A" stroke-width="1.5"/>
    <circle cx="38" cy="31" r="20" fill="#FFD60A"/>
    <text x="38" y="36" text-anchor="middle" font-size="14" font-weight="800" fill="#0A0A0A">VT</text>
    <text x="70" y="28" font-size="13" font-weight="800" fill="#0A0A0A">Vietravel</text>
    <text x="70" y="44" font-size="10" fill="#6B6B70">★ 4.8 · 240 tour · 12 năm</text>
    <rect x="270" y="16" width="70" height="30" rx="15" fill="#0A0A0A"/>
    <text x="305" y="35" text-anchor="middle" font-size="11" font-weight="700" fill="#FFD60A">Chat 💬</text>
  </g>

  <!-- Bottom CTA bar -->
  <g transform="translate(0,754)" filter="url(#sh)">
    <rect width="390" height="90" fill="#FFFBEA"/>
    <text x="20" y="32" font-size="11" fill="#6B6B70">Từ</text>
    <text x="20" y="56" font-size="22" font-weight="800" fill="#0A0A0A">1.290.000đ</text>
    <text x="20" y="74" font-size="10" fill="#6B6B70" text-decoration="line-through">1.720.000đ</text>
    <text x="100" y="74" font-size="10" font-weight="700" fill="#0A0A0A">·  Còn 8 chỗ</text>
    <rect x="200" y="22" width="170" height="50" rx="25" fill="url(#ctaGrad)"/>
    <text x="285" y="53" text-anchor="middle" font-size="15" font-weight="800" fill="#0A0A0A">Đặt ngay →</text>
  </g>
</svg>

