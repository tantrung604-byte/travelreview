<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="-apple-system, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="0.6" stop-color="#1A1A1D"/>
      <stop offset="1" stop-color="#3A2E00"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.85" cy="0.2" r="0.4">
      <stop offset="0" stop-color="#FFD60A" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FFD60A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardImg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD60A"/>
      <stop offset="1" stop-color="#FF9F0A"/>
    </linearGradient>
    <linearGradient id="cardImg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0A0A"/>
      <stop offset="1" stop-color="#FFD60A"/>
    </linearGradient>
    <linearGradient id="cardImg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5A524"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="ctaWeb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD60A"/>
      <stop offset="1" stop-color="#FFAB00"/>
    </linearGradient>
    <filter id="sh2"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>

  <!-- Browser chrome -->
  <rect width="1440" height="900" fill="#FFFBEA"/>

  <!-- Hero section -->
  <rect width="1440" height="540" fill="url(#heroGrad)"/>
  <rect width="1440" height="540" fill="url(#sun)"/>

  <!-- Top nav -->
  <g transform="translate(80,32)">
    <!-- Logo -->
    <rect width="42" height="42" rx="12" fill="#FFD60A"/>
    <text x="21" y="29" text-anchor="middle" font-size="22" font-weight="900" fill="#0A0A0A">T</text>
    <text x="56" y="28" font-size="20" font-weight="800" fill="#FFFBEA">TravelReview</text>

    <!-- Menu -->
    <g transform="translate(420,12)" font-size="14" font-weight="600" fill="#FFFBEA">
      <text>Khám phá</text>
      <text x="100">Tour nổi bật</text>
      <text x="220">Cộng đồng</text>
      <text x="320">Trở thành Operator</text>
      <text x="490">Hỗ trợ</text>
    </g>

    <!-- Lang + Login + CTA -->
    <g transform="translate(1100,4)">
      <text x="0" y="22" font-size="13" font-weight="600" fill="#FFFBEA">🌐 VI</text>
      <rect x="40" y="0" width="84" height="36" rx="18" fill="none" stroke="#FFD60A" stroke-width="1.5"/>
      <text x="82" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#FFD60A">Đăng nhập</text>
      <rect x="138" y="0" width="120" height="36" rx="18" fill="#FFD60A"/>
      <text x="198" y="24" text-anchor="middle" font-size="13" font-weight="800" fill="#0A0A0A">Đăng ký miễn phí</text>
    </g>
  </g>

  <!-- Hero text -->
  <g transform="translate(80,170)">
    <text font-size="14" font-weight="700" fill="#FFD60A" letter-spacing="2">★ #1 NỀN TẢNG REVIEW DU LỊCH VIỆT</text>
    <text y="60" font-size="68" font-weight="900" fill="#FFFBEA">Đi đâu cũng có</text>
    <text y="138" font-size="68" font-weight="900" fill="#FFD60A">người đi trước.</text>
    <text y="195" font-size="18" fill="#D1D5DB">125.000+ review thật từ người Việt — không bịa, không quảng cáo trá hình.</text>

    <!-- Search panel -->
    <g transform="translate(0,240)" filter="url(#sh2)">
      <rect width="720" height="86" rx="20" fill="#FFFBEA"/>
      <text x="28" y="36" font-size="11" font-weight="700" fill="#6B6B70">ĐIỂM ĐẾN</text>
      <text x="28" y="62" font-size="16" font-weight="700" fill="#0A0A0A">Đà Nẵng, Việt Nam</text>
      <line x1="240" y1="20" x2="240" y2="66" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
      <text x="260" y="36" font-size="11" font-weight="700" fill="#6B6B70">NGÀY ĐI</text>
      <text x="260" y="62" font-size="16" font-weight="700" fill="#0A0A0A">12 — 14 / 05</text>
      <line x1="430" y1="20" x2="430" y2="66" stroke="#0A0A0A" stroke-width="0.5" opacity="0.2"/>
      <text x="450" y="36" font-size="11" font-weight="700" fill="#6B6B70">KHÁCH</text>
      <text x="450" y="62" font-size="16" font-weight="700" fill="#0A0A0A">2 người lớn</text>
      <rect x="588" y="14" width="118" height="58" rx="29" fill="url(#ctaWeb)"/>
      <text x="647" y="50" text-anchor="middle" font-size="15" font-weight="800" fill="#0A0A0A">🔍 Tìm tour</text>
    </g>

    <!-- Stats -->
    <g transform="translate(0,360)" font-family="inherit">
      <text font-size="32" font-weight="900" fill="#FFD60A">125k+</text>
      <text y="20" font-size="12" fill="#D1D5DB">Review thật</text>

      <text x="160" font-size="32" font-weight="900" fill="#FFD60A">8.500+</text>
      <text x="160" y="20" font-size="12" fill="#D1D5DB">Tour & trải nghiệm</text>

      <text x="360" font-size="32" font-weight="900" fill="#FFD60A">450+</text>
      <text x="360" y="20" font-size="12" fill="#D1D5DB">Operator đã verify</text>
    </g>
  </g>

  <!-- Hero right preview phone mockup -->
  <g transform="translate(1020,150)" filter="url(#sh2)">
    <rect width="280" height="380" rx="36" fill="#0A0A0A"/>
    <rect x="14" y="14" width="252" height="352" rx="24" fill="url(#cardImg1)"/>
    <rect x="14" y="280" width="252" height="86" rx="0" fill="#0A0A0A" opacity="0.75"/>
    <text x="30" y="310" font-size="14" font-weight="800" fill="#FFFBEA">Phú Quốc 4N3Đ</text>
    <text x="30" y="328" font-size="11" fill="#FFD60A">★ 4.9 · 1.2k review</text>
    <rect x="30" y="338" width="80" height="22" rx="11" fill="#FFD60A"/>
    <text x="70" y="354" text-anchor="middle" font-size="11" font-weight="800" fill="#0A0A0A">2.490k</text>
  </g>

  <!-- Editorial / cards section -->
  <g transform="translate(80,600)">
    <text font-size="28" font-weight="900" fill="#0A0A0A">🔥 Trending tuần này</text>
    <text x="1140" y="0" text-anchor="end" font-size="14" font-weight="700" fill="#0A0A0A">Xem tất cả →</text>
  </g>

  <!-- 3 cards -->
  <g transform="translate(80,640)">
    <g filter="url(#sh2)">
      <rect width="400" height="220" rx="20" fill="url(#cardImg1)"/>
      <rect y="140" width="400" height="80" fill="#0A0A0A" opacity="0.85"/>
      <rect x="16" y="16" width="84" height="26" rx="13" fill="#0A0A0A"/>
      <text x="58" y="33" text-anchor="middle" font-size="11" font-weight="700" fill="#FFD60A">⚡ HOT</text>
      <text x="20" y="170" font-size="16" font-weight="800" fill="#FFFBEA">Đà Nẵng — Bà Nà Hills 3N2Đ</text>
      <text x="20" y="190" font-size="12" fill="#FFD60A">★ 4.9 · 2.341 đánh giá</text>
      <text x="20" y="208" font-size="14" font-weight="800" fill="#FFD60A">1.290.000đ</text>
    </g>

    <g transform="translate(420,0)" filter="url(#sh2)">
      <rect width="400" height="220" rx="20" fill="url(#cardImg2)"/>
      <rect y="140" width="400" height="80" fill="#0A0A0A" opacity="0.85"/>
      <rect x="16" y="16" width="84" height="26" rx="13" fill="#FFD60A"/>
      <text x="58" y="33" text-anchor="middle" font-size="11" font-weight="800" fill="#0A0A0A">-25%</text>
      <text x="20" y="170" font-size="16" font-weight="800" fill="#FFFBEA">Sapa — Fansipan 2N1Đ</text>
      <text x="20" y="190" font-size="12" fill="#FFD60A">★ 4.8 · 1.892 đánh giá</text>
      <text x="20" y="208" font-size="14" font-weight="800" fill="#FFD60A">1.890.000đ</text>
    </g>

    <g transform="translate(840,0)" filter="url(#sh2)">
      <rect width="400" height="220" rx="20" fill="url(#cardImg3)"/>
      <rect y="140" width="400" height="80" fill="#0A0A0A" opacity="0.85"/>
      <rect x="16" y="16" width="100" height="26" rx="13" fill="#FFFBEA"/>
      <text x="66" y="33" text-anchor="middle" font-size="11" font-weight="700" fill="#0A0A0A">EDITOR'S PICK</text>
      <text x="20" y="170" font-size="16" font-weight="800" fill="#FFFBEA">Phú Quốc — Hòn Thơm 4N3Đ</text>
      <text x="20" y="190" font-size="12" fill="#FFD60A">★ 4.9 · 1.124 đánh giá</text>
      <text x="20" y="208" font-size="14" font-weight="800" fill="#FFD60A">2.490.000đ</text>
    </g>
  </g>

  <!-- Footer hint -->
  <line x1="0" y1="880" x2="1440" y2="880" stroke="#0A0A0A" opacity="0.1"/>
  <text x="80" y="894" font-size="11" fill="#6B6B70">© 2026 TravelReview · Privacy · Terms · Community · Cookies</text>
</svg>

