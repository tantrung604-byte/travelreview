<!DOCTYPE html>
<html lang="vi">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/travelreview/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Core SEO / AIO -->
  <title>TravelReview - Review du lịch chân thực từ người Việt</title>
  <meta name="description" content="Khám phá tour du lịch, đọc review chân thực từ người Việt và đặt tour an toàn với TravelReview.">
  <meta name="keywords" content="TravelReview, review du lịch, đặt tour, tour Việt Nam, đánh giá tour, du lịch Đà Nẵng, du lịch Sapa">
  <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <meta name="googlebot" content="index,follow">
  <meta name="author" content="TravelReview">
  <meta name="language" content="vi-VN">
  <link rel="canonical" href="https://travelreview.vn/">

  <!-- Open Graph / Social sharing -->
  <meta property="og:locale" content="vi_VN">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="TravelReview">
  <meta property="og:title" content="TravelReview - Nền tảng review du lịch chân thực">
  <meta property="og:description" content="Khám phá, so sánh và đặt tour với review từ người thật, operator đã xác minh.">
  <meta property="og:url" content="https://travelreview.vn/">
  <meta property="og:image" content="https://travelreview.vn/icons/Icon-512.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TravelReview - Review du lịch chân thực">
  <meta name="twitter:description" content="Đọc review thật, so sánh tour, đặt tour an toàn.">
  <meta name="twitter:image" content="https://travelreview.vn/icons/Icon-512.png">

  <!-- PWA / App Links -->
  <meta name="application-name" content="TravelReview">
  <meta name="apple-mobile-web-app-title" content="TravelReview">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#FFD60A">

  <!-- Structured Data: Organization + Website SearchAction -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TravelReview",
    "url": "https://travelreview.vn",
    "logo": "https://travelreview.vn/icons/Icon-512.png",
    "description": "Nền tảng review du lịch chân thực từ người Việt",
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Customer Service",
      "email": "support@travelreview.vn"
    }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "TravelReview",
    "url": "https://travelreview.vn",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://travelreview.vn/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <link rel="manifest" href="manifest.json">
</head>
<body>
  <noscript>
    <main>
      <h1>TravelReview - Nền tảng Review Du Lịch Chân Thực</h1>
      <h2>Khám phá tour du lịch Việt Nam</h2>
      <p>TravelReview giúp bạn đọc review thật, so sánh tour và đặt tour an toàn với operator đã xác minh.</p>
      <h2>Đọc đánh giá từ người Việt</h2>
      <p>Kho review cộng đồng giúp bạn chọn đúng trải nghiệm trước khi thanh toán.</p>
      <h2>Quản trị SEO, H1, H2 và schema trong Admin Portal</h2>
      <p>Admin có công cụ SEO Manager để quản lý title, description, H1/H2, canonical URL và JSON-LD.</p>
    </main>
  </noscript>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
